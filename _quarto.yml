project:
  type: website

# To språkprofiler. Engelsk er standard (rot-domenet).
# Rendres hver for seg: `quarto render --profile en` og `quarto render --profile nb`.
profile:
  default: en
  group: [en, nb]

format:
  html:
    theme:
      - cosmo
      - styles.scss
    toc: true
    code-tools: false
    highlight-style: github
    fontsize: 1.05em
    linkcolor: "#1b5e8c"
