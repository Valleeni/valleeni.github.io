name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.6.40

      - name: Render English (default, -> _site/en)
        run: quarto render --profile en

      - name: Render Norwegian (-> _site/nb)
        run: quarto render --profile nb

      - name: Add root redirect and CNAME
        run: |
          echo "vallee.no" > _site/CNAME
          cat > _site/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=./en/">
            <link rel="canonical" href="https://vallee.no/en/">
            <title>Nicolay Vallée</title>
          </head>
          <body>
            Redirecting to <a href="./en/">vallee.no/en</a>…
          </body>
          </html>
          HTML

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
